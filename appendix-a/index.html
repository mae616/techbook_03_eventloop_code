<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シューティング Lite</title>
<style>
  body { margin: 0; background: #111; display: flex;
         justify-content: center; align-items: center; height: 100vh; }
  canvas { border: 1px solid #444; }
</style>
</head>
<body>
<canvas id="game" width="320" height="480"></canvas>
<script>
// --- 状態の初期化 ---
// --- 状態の初期化（空間: グローバルスコープに配置） ---
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

const player = { x: W / 2 - 15, y: H - 50, w: 30, h: 20,
                 speed: 4 };
const bullets = [];  // 弾の配列
const enemies = [];  // 敵の配列
let score = 0;       // スコア（クロージャで閉じることも可能）
let frame = 0;       // フレームカウンター
const keys = {};     // キー入力の状態

// --- キーボード入力（時間: イベントがTask Queueへ） ---
window.addEventListener('keydown', (e) => { keys[e.key] = true; });
window.addEventListener('keyup', (e) => { keys[e.key] = false; });

// --- 入力処理 ---
function handleInput() {
  if (keys['ArrowLeft'] && player.x > 0) {
    player.x -= player.speed;
  }
  if (keys['ArrowRight'] && player.x < W - player.w) {
    player.x += player.speed;
  }
}

// --- 自動連射（10フレームごと） ---
function autoFire() {
  if (frame % 10 === 0) {
    bullets.push({ x: player.x + player.w / 2 - 2, y: player.y, w: 4, h: 10 });
  }
}

// --- 敵の生成（30フレームごと） ---
function spawnEnemy() {
  if (frame % 30 === 0) {
    const ex = Math.random() * (W - 30);
    enemies.push({ x: ex, y: -30, w: 30, h: 30, speed: 2 });
  }
}

// --- 状態更新 ---
function update() {
  // 弾を上に移動し、画面外を削除
  for (let i = bullets.length - 1; i >= 0; i--) {
    bullets[i].y -= 6;
    if (bullets[i].y + bullets[i].h < 0) {
      bullets.splice(i, 1);
    }
  }
  // 敵を下に移動し、画面外を削除
  for (let i = enemies.length - 1; i >= 0; i--) {
    enemies[i].y += enemies[i].speed;
    if (enemies[i].y > H) {
      enemies.splice(i, 1);
    }
  }
}

// --- 当たり判定 ---
function checkCollision() {
  for (let ei = enemies.length - 1; ei >= 0; ei--) {
    for (let bi = bullets.length - 1; bi >= 0; bi--) {
      const e = enemies[ei];
      const b = bullets[bi];
      if (b.x < e.x + e.w && b.x + b.w > e.x &&
          b.y < e.y + e.h && b.y + b.h > e.y) {
        enemies.splice(ei, 1);
        bullets.splice(bi, 1);
        score += 100;
        break;
      }
    }
  }
}

// --- 描画 ---
function draw() {
  // 背景
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);
  // プレイヤー
  ctx.fillStyle = '#0ff';
  ctx.fillRect(player.x, player.y, player.w, player.h);
  // 弾
  ctx.fillStyle = '#ff0';
  for (const b of bullets) {
    ctx.fillRect(b.x, b.y, b.w, b.h);
  }
  // 敵
  ctx.fillStyle = '#f44';
  for (const e of enemies) {
    ctx.fillRect(e.x, e.y, e.w, e.h);
  }
  // スコア
  ctx.fillStyle = '#fff';
  ctx.font = '16px monospace';
  ctx.fillText('SCORE: ' + score, 10, 24);
}

// --- ゲームループ（時間: rAFで毎フレーム予約） ---
function gameLoop() {
  handleInput();
  autoFire();
  spawnEnemy();
  update();
  checkCollision();
  draw();
  frame++;
  requestAnimationFrame(gameLoop);
}

// --- 開始 ---
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
