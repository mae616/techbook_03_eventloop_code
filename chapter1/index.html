<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>第1章 この後編で使う地図をそろえる</title>
</head>
<body>
<h1>第1章 この後編で使う地図をそろえる</h1>

<h2>コード 1.1.1: 記述順と実行順のズレ</h2>
<p>ブラウザの Console パネルを開いて確認してください。</p>
<script>
console.log('A');
setTimeout(() => console.log('B'), 0);
console.log('C');
</script>

<h2>コード 1.2.1: 同期・microtask・taskの実行順</h2>
<script>
console.log('[sync] 1');
setTimeout(() => console.log('[task] 2'), 0);
Promise.resolve().then(() => console.log('[micro] 3'));
console.log('[sync] 4');
</script>

<h2>コード 1.3.1: 同期ブロックによるフリーズ</h2>
<p>⚠ 注意: ブラウザが数秒フリーズします</p>
<button onclick="runFreeze()">実行する</button>
<script>
function runFreeze() {
  const start = Date.now();
  while (Date.now() - start < 3000) {
    // 3秒間、何もしない（同期的にブロック）
  }
  console.log('終わった');
}
</script>

<h2>コード 1.3.2: setTimeout(fn, 0) の実行タイミング</h2>
<script>
console.log('先');
setTimeout(() => console.log('あと'), 0);
console.log('先2');
</script>
</body>
</html>
