<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>第4章 「終わったあと」を値として扱う</title>
</head>
<body>
<h1>第4章 「終わったあと」を値として扱う</h1>
<p>⚠ fetch を使うコードはローカルサーバー経由で開いてください。</p>

<h2>コード 4.1.1: Promise.resolveと手動Promiseの実行順</h2>
<script>
console.log('[sync] 1');
Promise.resolve('即座に解決').then((value) => {
  console.log('[micro] 2', value);
});
new Promise((resolve) => {
  console.log('[sync] 3 Promiseの中（同期）');
  setTimeout(() => { resolve('1秒後に解決'); }, 1000);
}).then((value) => {
  console.log('[task→micro] 4', value);
});
console.log('[sync] 5');
</script>

<h2>コード 4.1.2: Promiseの状態遷移</h2>
<script>
Promise.resolve('成功の値')
  .then((value) => console.log('[fulfilled]', value))
  .catch((error) => console.log('[rejected]', error));
Promise.reject('失敗の理由')
  .then((value) => console.log('[fulfilled]', value))
  .catch((error) => console.log('[rejected]', error));
</script>

<h2>コード 4.2.1: microtaskとtaskの実行順</h2>
<script>
console.log('[sync] 1');
setTimeout(() => { console.log('[task] 2'); }, 0);
Promise.resolve().then(() => { console.log('[micro] 3'); });
Promise.resolve().then(() => { console.log('[micro] 4'); });
console.log('[sync] 5');
</script>

<h2>コード 4.2.2: microtask連鎖による飢餓</h2>
<script>
console.log('[sync] 開始');
setTimeout(() => {
  console.log('[task] ← これはいつ実行される？');
}, 0);
function chainMicro(count) {
  if (count <= 0) return;
  Promise.resolve().then(() => {
    console.log('[micro]', count);
    chainMicro(count - 1);
  });
}
chainMicro(5);
console.log('[sync] 終了');
</script>

<h2>コード 4.3.1: Promiseチェーンとasync/awaitの等価変換</h2>
<script>
function fetchWithChain() {
  console.log('[chain] 開始');
  return fetch('../sample.gif')
    .then((response) => {
      console.log('[chain] 取得完了', response.status);
      return response;
    })
    .then((response) => {
      console.log('[chain] 処理完了');
    });
}
async function fetchWithAwait() {
  console.log('[await] 開始');
  const response = await fetch('../sample.gif');
  console.log('[await] 取得完了', response.status);
  console.log('[await] 処理完了');
}
fetchWithChain();
fetchWithAwait();
</script>

<h2>コード 4.3.2: 逐次awaitとPromise.allの比較</h2>
<script>
async function sequential() {
  console.time('逐次');
  const a = await fetch('../sample.gif');
  const b = await fetch('../sample.gif');
  console.timeEnd('逐次');
}
async function parallel() {
  console.time('並行');
  const [a, b] = await Promise.all([
    fetch('../sample.gif'),
    fetch('../sample.gif')
  ]);
  console.timeEnd('並行');
}
sequential();
parallel();
</script>
</body>
</html>
